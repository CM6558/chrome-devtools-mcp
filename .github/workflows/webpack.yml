name: Build Chrome DevTools MCP
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        node-version: [ 22.x]  # 符合package.json要求
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Build project
      run: npm run build
    - name: Bundle package
      run: npm run bundle
    - name: Create distribution package
      run: npm pack
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: chrome-devtools-mcp-${{ matrix.node-version }}
        path: chrome-devtools-mcp-*.tgz
        retention-days: 30
